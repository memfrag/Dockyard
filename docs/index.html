<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dockyard</title>
    <!--
      CSP: no inline scripts; markdown/code libraries loaded from jsdelivr only.
      Data fetched from raw.githubusercontent.com. Images can come from any HTTPS origin
      or data: URLs (inlined SVG placeholders).
    -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   img-src https: data:;
                   script-src 'self' https://cdn.jsdelivr.net;
                   style-src 'self' 'unsafe-inline';
                   connect-src https://raw.githubusercontent.com https://api.github.com;
                   base-uri 'self';
                   form-action 'none';
                   frame-ancestors 'none'">
    <!-- Applies the user's stored theme preference before the body paints, to
         avoid a flash of light content for dark-mode users. Must stay synchronous
         (no defer/async) and above the stylesheet link. -->
    <script src="./assets/theme.js"></script>
    <link rel="stylesheet" href="./assets/styles.css">
    <!-- Markdown rendering + sanitizer. Pinned versions + SRI hashes; browser refuses
         to execute the script if the file bytes don't match. -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
            integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
            crossorigin="anonymous"
            defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"
            integrity="sha384-osZDKVu4ipZP703HmPOhWdyBajcFyjX2Psjk//TG1Rc0AdwEtuToaylrmcK3LdAl"
            crossorigin="anonymous"
            defer></script>
    <script src="./assets/app.js" type="module" defer></script>
</head>
<body>
    <aside id="sidebar">
        <div class="sidebar-search">
            <input id="search" type="search" placeholder="Search" autocomplete="off" spellcheck="false">
            <button id="theme-toggle" type="button" class="theme-toggle-btn" title="Appearance" aria-label="Cycle appearance">
                <span class="theme-toggle-icon" data-symbol="appearance-system"></span>
            </button>
        </div>

        <nav class="sidebar-nav">
            <h3>Dockyard</h3>
            <a class="nav-link" href="#/today">
                <span class="nav-icon" data-symbol="today"></span>
                <span class="nav-label">Today</span>
            </a>
            <a class="nav-link" href="#/discover">
                <span class="nav-icon" data-symbol="discover"></span>
                <span class="nav-label">Discover</span>
            </a>

            <h3>Categories</h3>
            <a class="nav-link" href="#/category/Design">
                <span class="nav-icon" data-symbol="design"></span>
                <span class="nav-label">Design</span>
            </a>
            <a class="nav-link" href="#/category/Development">
                <span class="nav-icon" data-symbol="development"></span>
                <span class="nav-label">Development</span>
            </a>
            <a class="nav-link" href="#/category/Entertainment">
                <span class="nav-icon" data-symbol="entertainment"></span>
                <span class="nav-label">Entertainment</span>
            </a>
            <a class="nav-link" href="#/category/Finance">
                <span class="nav-icon" data-symbol="finance"></span>
                <span class="nav-label">Finance</span>
            </a>
            <a class="nav-link" href="#/category/Productivity">
                <span class="nav-icon" data-symbol="productivity"></span>
                <span class="nav-label">Productivity</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a class="sidebar-download-btn"
               href="https://github.com/memfrag/Dockyard/releases/latest"
               target="_blank"
               rel="noopener noreferrer">
                <span class="sidebar-download-icon" data-symbol="download"></span>
                <span>Download for Mac</span>
            </a>
        </div>
    </aside>

    <main id="content">
        <div class="loading">Loading…</div>
    </main>

    <noscript>
        <p style="padding: 2rem">Dockyard on the web needs JavaScript enabled to display the catalog.</p>
    </noscript>
</body>
</html>
